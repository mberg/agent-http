<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Chat</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --accent: #8b5cf6;
    --accent-hover: #a78bfa;
    --user-bg: #1c2333;
    --assistant-bg: #161b22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .status-badge {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .status-badge.stable {
    background: rgba(63, 185, 80, 0.15);
    color: #3fb950;
  }

  .status-badge.running {
    background: rgba(210, 153, 34, 0.15);
    color: #d29922;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .msg {
    padding: 12px 16px;
    line-height: 1.6;
    font-size: 14px;
    border-radius: 8px;
  }

  .msg.user {
    background: var(--user-bg);
    border-left: 3px solid var(--accent);
  }

  .msg.assistant {
    background: var(--assistant-bg);
    border-left: 3px solid var(--border);
  }

  .msg .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .msg .role {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }

  .msg.user .role { color: var(--accent); }
  .msg.assistant .role { color: #58a6ff; }

  .msg .time {
    font-size: 11px;
    color: var(--text-muted);
  }

  .msg .body {
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .msg .body code {
    background: rgba(110, 118, 129, 0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  }

  .msg .body pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-size: 13px;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    line-height: 1.5;
  }

  .msg .body pre code {
    background: none;
    padding: 0;
    border-radius: 0;
  }

  .typing {
    padding: 12px 16px;
    color: var(--text-muted);
    font-size: 13px;
    display: none;
  }

  .typing.visible { display: block; }

  .typing span {
    animation: blink 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  #input-area {
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 42px;
    max-height: 160px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  #input:focus {
    outline: none;
    border-color: var(--accent);
  }

  #input::placeholder { color: var(--text-muted); }

  #send {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    align-self: flex-end;
    transition: background 0.15s;
  }

  #send:hover { background: var(--accent-hover); }
  #send:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 14px;
  }
</style>
</head>
<body>
<header>
  <h1>Claude Chat</h1>
  <span id="status" class="status-badge stable">stable</span>
</header>
<div id="messages">
  <div class="empty-state" id="empty">Send a message to get started</div>
</div>
<div class="typing" id="typing">
  Claude is thinking<span>.</span><span>.</span><span>.</span>
</div>
<div id="input-area">
  <textarea id="input" rows="1" placeholder="Message Claude..." autofocus></textarea>
  <button id="send">Send</button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
const typingEl = document.getElementById('typing');
const emptyEl = document.getElementById('empty');

const renderedIds = new Set();

// Load existing conversation
fetch('/messages')
  .then(r => r.json())
  .then(msgs => {
    if (msgs.length) emptyEl.remove();
    msgs.forEach(m => addMessage(m));
    scrollBottom();
  });

// SSE for real-time updates
const events = new EventSource('/events');

events.addEventListener('status', e => {
  const { status } = JSON.parse(e.data);
  statusEl.textContent = status;
  statusEl.className = 'status-badge ' + status;
  sendBtn.disabled = false;
  typingEl.classList.toggle('visible', status === 'running');
});

events.addEventListener('message', e => {
  const msg = JSON.parse(e.data);
  // Avoid duplicates from our own POST
  const id = msg.timestamp + msg.role + msg.content.slice(0, 50);
  if (renderedIds.has(id)) return;
  if (emptyEl.parentNode) emptyEl.remove();
  addMessage(msg);
  scrollBottom();
});

function addMessage(msg) {
  const id = msg.timestamp + msg.role + msg.content.slice(0, 50);
  renderedIds.add(id);

  const div = document.createElement('div');
  div.className = 'msg ' + msg.role;

  const time = new Date(msg.timestamp).toLocaleTimeString([], {
    hour: '2-digit', minute: '2-digit'
  });

  const label = msg.role === 'user' ? 'You' : 'Claude';
  const bodyHtml = formatContent(msg.content);

  div.innerHTML =
    '<div class="meta">' +
      '<span class="role">' + label + '</span>' +
      '<span class="time">' + time + '</span>' +
    '</div>' +
    '<div class="body">' + bodyHtml + '</div>';

  messagesEl.appendChild(div);
}

function formatContent(text) {
  // Escape HTML first
  let s = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Code blocks
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    '<pre><code>' + code.trimEnd() + '</code></pre>'
  );
  // Inline code
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  return s;
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';

  if (emptyEl.parentNode) emptyEl.remove();
  addMessage({ role: 'user', content: text, timestamp: new Date().toISOString() });
  scrollBottom();

  await fetch('/message', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content: text }),
  });
}

sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});
</script>
</body>
</html>
